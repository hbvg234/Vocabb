<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học & Kiểm tra Từ vựng Tiếng Anh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card-pop { animation: pop .25s ease; }
        @keyframes pop { 0%{transform:scale(.97);opacity:.6} 100%{transform:scale(1);opacity:1} }
        .shake { animation: shake .35s; }
        @keyframes shake { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-8px)} 40%,60%{transform:translateX(8px)} }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 8px; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const defaultWords = [
            { vi: "Trung tâm thể thao", en: "sport centre" },
            { vi: "Bánh mì kẹp", en: "sandwich" },
            { vi: "Màu sắc", en: "color" },
            { vi: "Đồ ăn / thức ăn", en: "food" },
            { vi: "Cá heo", en: "dolphin" },
            { vi: "Động vật", en: "animal" },
            { vi: "Màu sắc yêu thích của bạn là gì?", en: "What is your favourite color?" },
            { vi: "Voi", en: "Elephant" },
            { vi: "Hổ", en: "Tiger" },
            { vi: "Sư Tử", en: "Lion" }
        ];

        const STORAGE_KEY = "vocab_app_custom_words_v1";

        function loadCustomWords() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) { return []; }
        }
        function saveCustomWords(words) {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(words)); } catch (e) {}
        }

        const QUIZ_STORAGE_KEY = "vocab_app_custom_quizzes_v1";

        function loadCustomQuizzes() {
            try {
                const raw = localStorage.getItem(QUIZ_STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) { return []; }
        }
        function saveCustomQuizzes(quizzes) {
            try { localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(quizzes)); } catch (e) {}
        }

        const HISTORY_STORAGE_KEY = "vocab_app_quiz_history_v1";
        const MAX_HISTORY = 50;

        function loadHistory() {
            try {
                const raw = localStorage.getItem(HISTORY_STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) { return []; }
        }
        function saveHistory(items) {
            try { localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(items)); } catch (e) {}
        }

        function generateHint(en) {
            return en.replace(/[a-zA-Z]+/g, (w) => w[0] + "_".repeat(Math.max(w.length - 1, 0)));
        }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function normalize(s) {
            return s.toLowerCase().replace(/[.?!]/g, "").trim();
        }

        // ---------- Text-to-speech (đọc từ, ưu tiên giọng Google) ----------
        let cachedVoices = [];
        function refreshVoices() {
            if ('speechSynthesis' in window) cachedVoices = window.speechSynthesis.getVoices();
            return cachedVoices;
        }
        if (typeof window !== "undefined" && 'speechSynthesis' in window) {
            refreshVoices();
            window.speechSynthesis.onvoiceschanged = refreshVoices;
            // Khắc phục lỗi Chrome tự "treo" giọng đọc khi nói câu dài
            setInterval(() => {
                if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
                    window.speechSynthesis.pause();
                    window.speechSynthesis.resume();
                }
            }, 4000);
            // "Mở khóa" engine đọc ngay từ lần chạm/bấm đầu tiên của người dùng trên trang.
            // Một số trình duyệt (đặc biệt Safari/iOS) giữ im lặng cho tới khi speak() được gọi
            // trong 1 lần tương tác thật của người dùng - làm điều này 1 lần giúp các lần bấm
            // loa/mic về sau luôn chắc chắn phát ra âm thanh.
            let ttsUnlocked = false;
            const unlockTts = () => {
                if (ttsUnlocked) return;
                ttsUnlocked = true;
                try {
                    const u = new SpeechSynthesisUtterance(' ');
                    u.volume = 0;
                    window.speechSynthesis.speak(u);
                } catch (e) {}
                window.removeEventListener('click', unlockTts, true);
                window.removeEventListener('touchend', unlockTts, true);
            };
            window.addEventListener('click', unlockTts, true);
            window.addEventListener('touchend', unlockTts, true);
        }
        function pickEnglishVoice() {
            const voices = cachedVoices.length ? cachedVoices : refreshVoices();
            return (
                voices.find(v => /Google/i.test(v.name) && v.lang === 'en-US') ||
                voices.find(v => /Google/i.test(v.name) && v.lang.startsWith('en')) ||
                voices.find(v => v.lang === 'en-US') ||
                voices.find(v => v.lang && v.lang.startsWith('en')) ||
                voices[0] || null
            );
        }
        // Nói một từ/câu tiếng Anh - đảm bảo chắc chắn phát ra âm thanh mỗi lần bấm:
        // - Hủy lượt nói dở dang trước khi nói lượt mới (Chrome bỏ qua speak() nếu đang "speaking")
        // - Chờ 1 nhịp ngắn sau cancel() vì Chrome có bug: speak() gọi ngay sau cancel() trong cùng
        //   1 tick nhiều khi bị im lặng luôn
        // - Tự động thử lại 1 lần nếu không thấy sự kiện onstart/onerror nào bắn ra (Chrome "nuốt" lệnh)
        function speakWord(text, rate = 0.95, onStart, onEnd) {
            if (!text) { if (onEnd) onEnd(); return; }
            if (!('speechSynthesis' in window) || typeof SpeechSynthesisUtterance === 'undefined') {
                if (onEnd) onEnd();
                return;
            }
            const synth = window.speechSynthesis;
            const doSpeak = () => {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'en-US';
                utter.rate = rate;
                utter.pitch = 1;
                utter.volume = 1;
                const voice = pickEnglishVoice();
                if (voice) utter.voice = voice;

                let started = false;
                let retried = false;
                const handleFail = () => {
                    if (retried) { if (onEnd) onEnd(); return; }
                    retried = true;
                    try { synth.cancel(); } catch (e) {}
                    setTimeout(() => { try { synth.speak(utter); } catch (e) { if (onEnd) onEnd(); } }, 120);
                };
                utter.onstart = () => { started = true; onStart && onStart(); };
                utter.onend = () => onEnd && onEnd();
                utter.onerror = () => { if (!started) handleFail(); else if (onEnd) onEnd(); };
                try { synth.speak(utter); } catch (e) { handleFail(); }
                // Nếu sau 400ms vẫn chưa bắt đầu và cũng không còn trong hàng đợi -> coi như bị "nuốt lệnh", thử lại
                setTimeout(() => {
                    if (!started && !synth.speaking && !synth.pending) handleFail();
                }, 400);
            };

            if (synth.speaking || synth.pending || synth.paused) {
                synth.cancel();
                setTimeout(doSpeak, 60);
            } else {
                doSpeak();
            }
        }

        // ---------- Âm thanh phản hồi đúng/sai (kiểu phổ biến trong app học tập) ----------
        function playTone(freq, type, start, dur, ctx, peak = 0.22) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(0.0001, start);
            gain.gain.exponentialRampToValueAtTime(peak, start + 0.012);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
            osc.connect(gain).connect(ctx.destination);
            osc.start(start);
            osc.stop(start + dur + 0.02);
        }
        // Đúng: chuông "ting" 2 nốt đi lên (giống Duolingo/Kahoot)
        function playCorrectSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;
                playTone(987.77, 'triangle', now, 0.14, ctx);       // B5
                playTone(1318.51, 'triangle', now + 0.1, 0.22, ctx); // E6
            } catch (e) {}
        }
        // Sai: buzzer trầm 2 nốt đi xuống (giống âm báo lỗi phổ biến)
        function playWrongSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;
                playTone(196, 'square', now, 0.16, ctx, 0.15);
                playTone(146.83, 'square', now + 0.14, 0.22, ctx, 0.15);
            } catch (e) {}
        }

        // ---------- Chấm điểm phát âm (so khớp bản ghi giọng nói với từ gốc) ----------
        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
            for (let i = 0; i <= m; i++) dp[i][0] = i;
            for (let j = 0; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    dp[i][j] = a[i - 1] === b[j - 1]
                        ? dp[i - 1][j - 1]
                        : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
                }
            }
            return dp[m][n];
        }
        function pronunciationScore(target, spoken) {
            const t = normalize(target);
            const s = normalize(spoken);
            if (!s) return 0;
            const dist = levenshtein(t, s);
            const maxLen = Math.max(t.length, s.length) || 1;
            return Math.max(0, Math.round((1 - dist / maxLen) * 100));
        }
        function getSpeechRecognition() {
            return window.SpeechRecognition || window.webkitSpeechRecognition || null;
        }

        // ---------- Quyền Microphone: xin 1 lần duy nhất khi vào web, dùng chung toàn app ----------
        const MicPermissionContext = React.createContext('checking');
        function useMicPermission() {
            const [status, setStatus] = useState('checking'); // checking | granted | denied | prompt-needed | unsupported
            useEffect(() => {
                let cancelled = false;
                async function run() {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        if (!cancelled) setStatus('unsupported');
                        return;
                    }
                    // Nếu trình duyệt hỗ trợ Permissions API, kiểm tra trạng thái đã cấp trước đó
                    if (navigator.permissions && navigator.permissions.query) {
                        try {
                            const perm = await navigator.permissions.query({ name: 'microphone' });
                            if (cancelled) return;
                            if (perm.state === 'granted') { setStatus('granted'); return; }
                            if (perm.state === 'denied') { setStatus('denied'); return; }
                            perm.onchange = () => setStatus(perm.state === 'granted' ? 'granted' : perm.state === 'denied' ? 'denied' : 'prompt-needed');
                        } catch (e) { /* một số trình duyệt (Safari) không hỗ trợ 'microphone' trong Permissions API */ }
                    }
                    // Chưa từng được cấp -> chủ động bật hộp thoại xin quyền ngay khi vào web (chỉ 1 lần)
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        stream.getTracks().forEach(t => t.stop());
                        if (!cancelled) setStatus('granted');
                    } catch (e) {
                        if (!cancelled) setStatus('denied');
                    }
                }
                run();
                return () => { cancelled = true; };
            }, []);
            return status;
        }

        function MicPermissionBanner({ status }) {
            if (status === 'denied') {
                return (
                    <div className="bg-red-50 border-b border-red-200 text-red-700 text-sm px-4 py-2 text-center">
                        <i className="fas fa-microphone-slash mr-2"></i>
                        Bạn đã chặn quyền Micro nên không thể dùng chức năng luyện nói. Bấm vào biểu tượng ổ khóa cạnh URL, bật lại quyền Micro rồi tải lại trang.
                    </div>
                );
            }
            if (status === 'unsupported') {
                return (
                    <div className="bg-amber-50 border-b border-amber-200 text-amber-700 text-sm px-4 py-2 text-center">
                        <i className="fas fa-triangle-exclamation mr-2"></i>
                        Trình duyệt này chưa hỗ trợ ghi âm (Micro). Hãy dùng Chrome để dùng đầy đủ chức năng luyện phát âm.
                    </div>
                );
            }
            return null;
        }

        // Dịch tự động 2 chiều: mặc định Anh -> Việt (dùng khi để trống ô Tiếng Việt).
        // Truyền direction = 'vi-en' để dịch ngược Việt -> Anh (khi để trống ô Tiếng Anh).
        async function autoTranslate(word, direction = 'en-vi') {
            const langpair = direction === 'vi-en' ? 'vi|en' : 'en|vi';
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=${langpair}`);
                const data = await res.json();
                const text = data && data.responseData && data.responseData.translatedText;
                if (text && !/mymemory|invalid|query length/i.test(text)) {
                    return text.charAt(0).toUpperCase() + text.slice(1);
                }
                return "";
            } catch (e) { return ""; }
        }

        // Tìm hình ảnh phù hợp với từ tiếng Anh: ưu tiên ảnh thật từ Wikipedia (chính xác theo nghĩa của từ),
        // sau đó mới đến các nguồn ảnh chung chung nếu Wikipedia không có kết quả.
        async function fetchWikipediaImage(term) {
            try {
                const searchRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term)}&format=json&origin=*&srlimit=1`);
                const searchData = await searchRes.json();
                const title = searchData && searchData.query && searchData.query.search && searchData.query.search[0] && searchData.query.search[0].title;
                if (!title) return null;
                const sumRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
                const sumData = await sumRes.json();
                const url = (sumData.originalimage && sumData.originalimage.source) || (sumData.thumbnail && sumData.thumbnail.source);
                return url || null;
            } catch (e) { return null; }
        }
        // Nguồn ảnh ngẫu nhiên chung (Flickr Creative Commons theo tag)
        function loremflickrUrl(enWord) {
            return `https://loremflickr.com/640/480/${encodeURIComponent(enWord.split(' ')[0])}?lock=${encodeURIComponent(enWord)}`;
        }
        // Phương án cuối cùng nếu mọi nguồn ảnh khác đều lỗi: ảnh chữ để trang không bị vỡ layout
        function textFallbackUrl(enWord) {
            return `https://placehold.co/640x480/6366f1/ffffff?font=inter&text=${encodeURIComponent(enWord)}`;
        }
        // Xây danh sách ảnh ứng viên theo thứ tự ưu tiên chính xác giảm dần
        async function buildImageCandidates(enWord) {
            const wiki = await fetchWikipediaImage(enWord);
            const candidates = [];
            if (wiki) candidates.push(wiki);
            candidates.push(loremflickrUrl(enWord));
            candidates.push(textFallbackUrl(enWord));
            return candidates;
        }

        // ---------- Reusable UI bits ----------
        function TopBar({ title, onBack, right }) {
            return (
                <div className="flex items-center justify-between mb-6">
                    {onBack ? (
                        <button onClick={onBack} className="w-10 h-10 rounded-full bg-white shadow flex items-center justify-center text-indigo-600 hover:bg-indigo-50 transition-colors">
                            <i className="fas fa-arrow-left"></i>
                        </button>
                    ) : <div className="w-10"></div>}
                    <h2 className="text-lg font-bold text-gray-800">{title}</h2>
                    <div className="w-10 flex justify-end">{right}</div>
                </div>
            );
        }

        // ---------- Reusable: nút loa + luyện phát âm ----------
        function SpeakerButton({ word, size = "w-9 h-9", className = "" }) {
            const [speaking, setSpeaking] = useState(false);
            const speakingRef = React.useRef(false);
            useEffect(() => () => { speakingRef.current = false; }, []);
            const handleClick = (e) => {
                e.preventDefault(); e.stopPropagation();
                speakingRef.current = true;
                setSpeaking(true);
                speakWord(
                    word,
                    0.95,
                    () => { if (speakingRef.current) setSpeaking(true); },
                    () => { speakingRef.current = false; setSpeaking(false); }
                );
            };
            return (
                <button
                    type="button"
                    onClick={handleClick}
                    title="Nghe phát âm"
                    className={`${size} rounded-full flex items-center justify-center active:scale-90 transition-all duration-200 ease-out flex-shrink-0 ${
                        speaking ? 'bg-indigo-500 text-white scale-110 shadow-md shadow-indigo-200' : 'bg-indigo-100 text-indigo-600 hover:bg-indigo-200 hover:scale-105'
                    } ${className}`}
                >
                    <i className={`fas fa-volume-high ${speaking ? 'animate-pulse' : ''}`}></i>
                </button>
            );
        }

        // Widget đầy đủ: nghe mẫu + ghi âm + AI chấm điểm phát âm + gợi ý sửa
        function PronounceWidget({ word, compact = false }) {
            const micStatus = React.useContext(MicPermissionContext);
            const hasRecognitionApi = typeof window !== "undefined" && !!getSpeechRecognition();
            const supported = hasRecognitionApi && micStatus !== 'unsupported' && micStatus !== 'denied';
            const [listening, setListening] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [score, setScore] = useState(null);
            const [error, setError] = useState("");
            const recRef = React.useRef(null);

            useEffect(() => () => { if (recRef.current) { try { recRef.current.stop(); } catch (e) {} } }, []);

            const startListening = () => {
                if (!hasRecognitionApi) { setError("Trình duyệt chưa hỗ trợ nhận diện giọng nói (hãy dùng Chrome)."); return; }
                if (micStatus === 'denied') { setError("Bạn đã chặn quyền Micro. Vào cài đặt trình duyệt để bật lại."); return; }
                setError(""); setScore(null); setTranscript("");
                // Quyền micro đã được xin 1 lần duy nhất khi vào web, nên ở đây chỉ cần khởi động nhận diện giọng nói
                const SR = getSpeechRecognition();
                const rec = new SR();
                rec.lang = "en-US";
                rec.interimResults = false;
                rec.maxAlternatives = 1;
                rec.continuous = false;
                rec.onstart = () => setListening(true);
                rec.onresult = (ev) => {
                    const heard = ev.results[0][0].transcript;
                    setTranscript(heard);
                    setScore(pronunciationScore(word, heard));
                };
                rec.onerror = (ev) => {
                    // Khi người dùng chủ động bấm dừng, trình duyệt cũng bắn ra lỗi "aborted" - bỏ qua lỗi đó
                    if (ev && ev.error === 'aborted') { setListening(false); return; }
                    setError("Không nghe rõ, hãy thử lại.");
                    setListening(false);
                };
                rec.onend = () => { setListening(false); recRef.current = null; };
                recRef.current = rec;
                try { rec.start(); } catch (e) { setError("Không thể khởi động micro."); }
            };

            const stopListening = () => {
                if (recRef.current) {
                    try { recRef.current.stop(); } catch (e) {}
                }
                setListening(false);
            };

            // Bấm 1 lần để bắt đầu ghi âm, bấm thêm lần nữa (khi đang ghi) để dừng ngay lập tức
            const handleMicClick = (e) => {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if (listening) stopListening();
                else startListening();
            };

            const scoreColor = score === null ? "" :
                score >= 85 ? "text-green-600 bg-green-50 border-green-200" :
                score >= 60 ? "text-amber-600 bg-amber-50 border-amber-200" :
                "text-red-600 bg-red-50 border-red-200";

            return (
                <div className={compact ? "flex items-center gap-1.5" : "flex flex-col gap-2"}>
                    <div className="flex items-center gap-1.5">
                        <SpeakerButton word={word} size={compact ? "w-8 h-8 text-sm" : "w-10 h-10"} />
                        {hasRecognitionApi && (
                            <button
                                type="button"
                                onClick={handleMicClick}
                                disabled={!supported}
                                title={
                                    !supported ? "Cần cấp quyền Micro để dùng chức năng này" :
                                    listening ? "Đang ghi âm... bấm để dừng" : "Bấm để ghi âm, bấm lại để dừng"
                                }
                                className={`${compact ? "w-8 h-8 text-sm" : "w-10 h-10"} rounded-full flex items-center justify-center transition-all duration-200 ease-out active:scale-90 flex-shrink-0 ${
                                    listening ? "bg-red-500 text-white scale-110 shadow-md shadow-red-200 animate-pulse" :
                                    !supported ? "bg-gray-100 text-gray-300 cursor-not-allowed" :
                                    "bg-emerald-100 text-emerald-600 hover:bg-emerald-200 hover:scale-105"
                                }`}
                            >
                                <i className={`fas ${listening ? "fa-stop" : "fa-microphone"}`}></i>
                            </button>
                        )}
                    </div>
                    {score !== null && (
                        <div className={`text-xs font-semibold px-2.5 py-1.5 rounded-lg border ${scoreColor}`}>
                            <span className="font-bold">{score}%</span> giống chuẩn
                            {score < 85 && (
                                <span> · Bạn nói: "<span className="italic">{transcript || "..."}</span>"</span>
                            )}

        // ---------- Pronunciation Practice Screen ----------

            const [idx, setIdx] = useState(0);

            const current = words[order[idx % order.length]];

            const registerScore = (s) => setScores(prev => ({ ...prev, [idx]: s }));

        // ---------- Add Word Screen ----------
        function AddWord({ onBack, onSave }) {
            const [vi, setVi] = useState("");
            const [en, setEn] = useState("");
            const [hint, setHint] = useState("");
            const [justAdded, setJustAdded] = useState(false);
            const [translating, setTranslating] = useState(false);
            const [autoFilledEn, setAutoFilledEn] = useState(false);

            // Khi rời khỏi ô Tiếng Việt: nếu ô Tiếng Anh đang trống, tự động dịch Việt -> Anh
            const handleViBlur = async () => {
                if (en.trim() || !vi.trim() || translating) return;
                setTranslating(true);
                const translated = await autoTranslate(vi.trim(), 'vi-en');
                setTranslating(false);
                if (translated) { setEn(translated); setAutoFilledEn(true); }
            };

            const submit = async (e) => {
                e.preventDefault();
                if ((!en.trim() && !vi.trim()) || translating) return;

                let finalEn = en.trim();
                let finalVi = vi.trim();

                // Ô Tiếng Anh trống -> tự động chuyển đổi từ Tiếng Việt sang Tiếng Anh
                if (!finalEn && finalVi) {
                    setTranslating(true);
                    finalEn = await autoTranslate(finalVi, 'vi-en');
                    setTranslating(false);
                    if (!finalEn) { finalEn = finalVi; }
                }
                // Ô Tiếng Việt trống -> tự động dịch từ Tiếng Anh sang Tiếng Việt (như cũ)
                if (!finalVi && finalEn) {
                    setTranslating(true);
                    finalVi = await autoTranslate(finalEn, 'en-vi');
                    setTranslating(false);
                    if (!finalVi) { finalVi = finalEn; }
                }

                // Tạo câu hỏi theo đúng cấu trúc hiện có (gợi ý dạng "u___" dựa trên từ tiếng Anh cuối cùng)
                onSave({ vi: finalVi, en: finalEn, hint: (hint.trim() || generateHint(finalEn)) });
                setVi(""); setEn(""); setHint(""); setAutoFilledEn(false);
                setJustAdded(true);
                setTimeout(() => setJustAdded(false), 1500);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl max-w-xl w-full">
                        <TopBar title="Thêm từ mới" onBack={onBack} />

                        <form onSubmit={submit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-semibold text-gray-600 mb-1">Từ tiếng Anh</label>
                                <input value={en} onChange={e => { setEn(e.target.value); setAutoFilledEn(false); }} placeholder="VD: umbrella — hoặc để trống để tự dịch"
                                    className="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-indigo-500 transition-colors" />
                                {autoFilledEn && <p className="mt-1 text-xs text-emerald-600"><i className="fas fa-wand-magic-sparkles mr-1"></i>Đã tự động dịch</p>}
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-gray-600 mb-1">Nghĩa tiếng Việt</label>
                                <input value={vi} onChange={e => setVi(e.target.value)} onBlur={handleViBlur} placeholder="VD: Cái ô / cây dù — hoặc để trống để tự dịch"
                                    className="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-indigo-500 transition-colors" />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-gray-600 mb-1">Gợi ý (không bắt buộc)</label>
                                <input value={hint} onChange={e => setHint(e.target.value)} placeholder={en ? generateHint(en) : "Tự động tạo nếu để trống"}
                                    className="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-indigo-500 transition-colors" />
                            </div>

                            <button type="submit" disabled={(!en.trim() && !vi.trim()) || translating}
                                className="w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 shadow-lg transition-all active:scale-95 disabled:opacity-60">
                                {translating ? <span><i className="fas fa-spinner fa-spin mr-2"></i>Đang tự động dịch...</span> :
                                 justAdded ? <span><i className="fas fa-check mr-2"></i>Đã thêm!</span> :
                                 <span><i className="fas fa-plus mr-2"></i>Thêm vào kho từ vựng</span>}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // ---------- Manage Words Screen ----------
        function ManageWords({ words, onBack, onDelete }) {
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl max-w-2xl w-full">

                                            <p className="text-sm text-gray-500 truncate">{w.vi}</p>

                                                <i className="fas fa-trash"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ---------- Create Custom Quiz Screen ----------
        function CreateQuiz({ onBack, onSave }) {
            const [name, setName] = useState("");
            const [quizMode, setQuizMode] = useState("type");
            const [rows, setRows] = useState([{ en: "", vi: "", hint: "" }, { en: "", vi: "", hint: "" }]);
            const [error, setError] = useState("");
            const [saving, setSaving] = useState(false);

            const updateRow = (idx, field, value) => {
                setRows(prev => prev.map((r, i) => i === idx ? { ...r, [field]: value } : r));
            };
            const addRow = () => setRows(prev => [...prev, { en: "", vi: "", hint: "" }]);
            const removeRow = (idx) => setRows(prev => prev.filter((_, i) => i !== idx));

            const save = async () => {
                setError("");
                const cleanRows = rows
                    .map(r => ({ en: r.en.trim(), vi: r.vi.trim(), hint: r.hint.trim() }))
                    .filter(r => r.en || r.vi);

                if (!name.trim()) { setError("Vui lòng đặt tên cho bộ đề."); return; }
                if (cleanRows.length < 2) { setError("Cần ít nhất 2 từ để tạo bộ đề."); return; }
                if (quizMode === 'choice' && cleanRows.length < 4) { setError("Chế độ 'Chọn nghĩa đúng' cần ít nhất 4 từ (để có đủ 4 đáp án)."); return; }

                setSaving(true);
                const finalRows = await Promise.all(cleanRows.map(async (r) => {
                    let en = r.en;
                    let vi = r.vi;
                    // Ô Tiếng Anh trống -> tự động chuyển đổi từ Tiếng Việt sang Tiếng Anh và tạo câu hỏi theo đúng cấu trúc
                    if (!en && vi) {
                        en = await autoTranslate(vi, 'vi-en');
                        if (!en) en = vi;
                    }
                    // Ô Tiếng Việt trống -> tự động dịch từ Tiếng Anh sang Tiếng Việt (như cũ)
                    if (!vi && en) {
                        vi = await autoTranslate(en, 'en-vi');
                        if (!vi) vi = en;
                    }
                    return { en, vi, hint: r.hint || generateHint(en) };
                }));
                setSaving(false);

                const quiz = { id: Date.now().toString(), name: name.trim(), mode: quizMode, words: finalRows };
                onSave(quiz);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl max-w-3xl w-full">
                        <TopBar title="Tạo bộ đề riêng" onBack={onBack} />

                        <div className="space-y-4 mb-6">
                            <div>
                                <label className="block text-sm font-semibold text-gray-600 mb-1">Tên bộ đề</label>
                                <input value={name} onChange={e => setName(e.target.value)} placeholder="VD: Từ vựng chủ đề gia đình"
                                    className="w-full p-3 border-2 border-gray-200 rounded-xl outline-none focus:border-rose-400 transition-colors" />
                            </div>

                            <div>
                                <label className="block text-sm font-semibold text-gray-600 mb-2">Kiểu câu hỏi</label>
                                <div className="grid grid-cols-3 gap-2">
                                    <button type="button" onClick={() => setQuizMode('type')}
                                        className={`p-3 rounded-xl border-2 font-semibold text-xs flex flex-col items-center justify-center gap-1 transition-all ${quizMode === 'type' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 text-gray-500'}`}>
                                        <i className="fas fa-keyboard"></i> Điền từ
                                    </button>
                                    <button type="button" onClick={() => setQuizMode('choice')}
                                        className={`p-3 rounded-xl border-2 font-semibold text-xs flex flex-col items-center justify-center gap-1 transition-all ${quizMode === 'choice' ? 'border-purple-500 bg-purple-50 text-purple-700' : 'border-gray-200 text-gray-500'}`}>
                                        <i className="fas fa-list-check"></i> Chọn nghĩa
                                    </button>
                                    <button type="button" onClick={() => setQuizMode('image')}
                                        className={`p-3 rounded-xl border-2 font-semibold text-xs flex flex-col items-center justify-center gap-1 transition-all ${quizMode === 'image' ? 'border-teal-500 bg-teal-50 text-teal-700' : 'border-gray-200 text-gray-500'}`}>
                                        <i className="fas fa-image"></i> Nhìn hình
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div>
                            <div className="flex items-center justify-between mb-2">
                                <label className="block text-sm font-semibold text-gray-600">Danh sách từ ({rows.length})</label>
                                <button onClick={addRow} className="text-sm font-semibold text-rose-600 hover:text-rose-700">
                                    <i className="fas fa-plus mr-1"></i>Thêm dòng
                                </button>
                            </div>

                            <div className="space-y-2 max-h-72 overflow-y-auto pr-1">
                                {rows.map((row, idx) => (
                                    <div key={idx} className="grid grid-cols-[1fr_1fr_auto] gap-2 items-center bg-gray-50 p-2 rounded-xl">
                                        <input value={row.en} onChange={e => updateRow(idx, 'en', e.target.value)} placeholder="Tiếng Anh (để trống = tự dịch)"
                                            className="p-2 border border-gray-200 rounded-lg outline-none focus:border-rose-400 text-sm" />
                                        <input value={row.vi} onChange={e => updateRow(idx, 'vi', e.target.value)} placeholder="Tiếng Việt (để trống = tự dịch)"
                                            className="p-2 border border-gray-200 rounded-lg outline-none focus:border-rose-400 text-sm" />
                                        <button onClick={() => removeRow(idx)} disabled={rows.length <= 2}
                                            className="w-9 h-9 rounded-lg text-red-400 hover:text-red-600 hover:bg-red-50 flex items-center justify-center disabled:opacity-30 disabled:hover:bg-transparent transition-colors">
                                            <i className="fas fa-trash"></i>
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {error && <p className="text-sm text-red-500 mt-3"><i className="fas fa-circle-exclamation mr-1"></i>{error}</p>}

                        <button onClick={save} disabled={saving}
                            className="w-full mt-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-rose-500 to-rose-600 hover:from-rose-600 hover:to-rose-700 shadow-lg transition-all active:scale-95 disabled:opacity-60">
                            {saving ? <span><i className="fas fa-spinner fa-spin mr-2"></i>Đang dịch & lưu...</span> : <span><i className="fas fa-floppy-disk mr-2"></i>Lưu bộ đề</span>}
                        </button>
                    </div>
                </div>
            );
        }

        // ---------- My Quizzes Screen ----------
        function MyQuizzes({ quizzes, onBack, onPlay, onDelete }) {
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl max-w-2xl w-full">
                        <TopBar title={`Bộ đề của tôi (${quizzes.length})`} onBack={onBack} />
                        {quizzes.length === 0 ? (
                            <div className="text-center py-10 text-gray-400">
                                <i className="fas fa-layer-group text-4xl mb-3"></i>
                                <p>Bạn chưa tạo bộ đề nào cả.</p>
                            </div>
                        ) : (
                            <div className="space-y-3 max-h-96 overflow-y-auto pr-1">
                                {quizzes.map((q) => (
                                    <div key={q.id} className="bg-gray-50 p-4 rounded-xl">
                                        <div className="flex items-start justify-between gap-2">
                                            <div>
                                                <p className="font-bold text-gray-800">{q.name}</p>
                                                <p className="text-xs text-gray-500 mt-1">
                                                    <i className={`fas ${q.mode === 'type' ? 'fa-keyboard' : q.mode === 'choice' ? 'fa-list-check' : 'fa-image'} mr-1`}></i>
                                                    {q.mode === 'type' ? 'Điền từ' : q.mode === 'choice' ? 'Chọn nghĩa đúng' : 'Nhìn hình đoán từ'} · {q.words.length} từ
                                                </p>
                                            </div>
                                            <button onClick={() => onDelete(q.id)} className="text-red-400 hover:text-red-600 w-9 h-9 rounded-full hover:bg-red-50 flex items-center justify-center transition-colors flex-shrink-0">
                                                <i className="fas fa-trash"></i>
                                            </button>
                                        </div>
                                        <button onClick={() => onPlay(q)}
                                            className="w-full mt-3 py-2 rounded-lg font-semibold text-sm text-white bg-sky-500 hover:bg-sky-600 transition-colors">
                                            <i className="fas fa-play mr-2"></i>Bắt đầu ôn tập
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

        // ---------- Word List Screen (toàn bộ từ vựng hiện có) ----------
        function WordList({ words, onBack }) {
            const [query, setQuery] = useState("");
            const filtered = query.trim()
                ? words.filter(w => w.en.toLowerCase().includes(query.toLowerCase()) || w.vi.toLowerCase().includes(query.toLowerCase()))
                : words;
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl max-w-2xl w-full">
                        <TopBar title={`Từ vựng hiện có (${words.length})`} onBack={onBack} />
                        <input
                            value={query} onChange={e => setQuery(e.target.value)}
                            placeholder="Tìm từ..."
                            className="w-full p-3 mb-4 border-2 border-gray-200 rounded-xl outline-none focus:border-indigo-500 transition-colors text-base md:text-lg"
                        />
                        {filtered.length === 0 ? (
                            <div className="text-center py-10 text-gray-400">
                                <i className="fas fa-magnifying-glass text-4xl mb-3"></i>
                                <p>Không tìm thấy từ nào.</p>
                            </div>
                        ) : (
                            <div className="space-y-2 max-h-[28rem] overflow-y-auto pr-1">
                                {filtered.map((w, idx) => (
                                    <div key={idx} className="flex items-center justify-between bg-gray-50 p-3 rounded-xl gap-2">
                                        <div className="min-w-0 flex-1">
                                            <p className="font-bold text-gray-800 text-lg truncate">{w.en}</p>
                                            <p className="text-gray-500 truncate">{w.vi}</p>
                                        </div>
                                        <SpeakerButton word={w.en} size="w-10 h-10" />
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ---------- Quiz History Screen (lịch sử làm bài) ----------
        function modeInfo(mode) {
            return mode === 'type' ? { label: 'Điền từ', icon: 'fa-keyboard', color: 'text-indigo-600' }
                 : mode === 'choice' ? { label: 'Chọn nghĩa đúng', icon: 'fa-list-check', color: 'text-purple-600' }
                 : { label: 'Nhìn hình đoán từ', icon: 'fa-image', color: 'text-teal-600' };
        }
        function formatHistoryDate(iso) {
            try {
                const d = new Date(iso);
                return d.toLocaleString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch (e) { return ""; }
        }
        function QuizHistory({ items, onBack, onClear }) {
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl max-w-2xl w-full">
                        <TopBar title={`Lịch sử làm bài (${items.length})`} onBack={onBack}
                            right={items.length > 0 && (
                                <button onClick={onClear} title="Xóa lịch sử" className="w-10 h-10 rounded-full bg-white shadow flex items-center justify-center text-red-400 hover:bg-red-50 transition-colors">
                                    <i className="fas fa-trash"></i>
                                </button>
                            )} />
                        {items.length === 0 ? (
                            <div className="text-center py-10 text-gray-400">
                                <i className="fas fa-clock-rotate-left text-4xl mb-3"></i>
                                <p>Bạn chưa làm bài kiểm tra nào cả.</p>
                            </div>
                        ) : (
                            <div className="space-y-2 max-h-[28rem] overflow-y-auto pr-1">
                                {items.map((h, idx) => {
                                    const info = modeInfo(h.mode);
                                    const pct = h.total ? Math.round((h.score / h.total) * 100) : 0;
                                    return (
                                        <div key={idx} className="flex items-center justify-between bg-gray-50 p-4 rounded-xl gap-3">
                                            <div className="min-w-0 flex-1">
                                                <p className="font-bold text-gray-800">
                                                    <i className={`fas ${info.icon} ${info.color} mr-2`}></i>
                                                    {h.quizName || info.label}
                                                </p>
                                                <p className="text-sm text-gray-400 mt-0.5">{formatHistoryDate(h.date)}</p>
                                            </div>
                                            <div className={`text-lg font-extrabold flex-shrink-0 ${pct >= 80 ? 'text-green-600' : pct >= 50 ? 'text-amber-600' : 'text-red-500'}`}>
                                                {h.score}/{h.total}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ---------- Quiz: Type mode ----------
        function TypeQuiz({ list, onFinish, onExit }) {
            const [idx, setIdx] = useState(0);
            const [input, setInput] = useState("");
            const [feedback, setFeedback] = useState(null);
            const [score, setScore] = useState(0);
            const [history, setHistory] = useState([]);

            const current = list[idx];
            const progress = ((idx + 1) / list.length) * 100;
            const isLast = idx === list.length - 1;

            const goNext = () => {
                if (!isLast) {
                    setIdx(i => i + 1);
                    setInput("");
                    setFeedback(null);
                } else {
                    onFinish(score, history);
                }
            };

            const submit = (e) => {
                e.preventDefault();
                if (feedback) { goNext(); return; }
                if (!input.trim()) return;
                const isCorrect = normalize(input) === normalize(current.en);
                if (isCorrect) { setScore(s => s + 1); playCorrectSound(); } else { playWrongSound(); }
                setFeedback(isCorrect ? 'correct' : 'wrong');
                setHistory(prev => [...prev, { ...current, userInput: input, isCorrect, mode: 'type' }]);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-6 md:p-10 rounded-2xl shadow-xl max-w-4xl w-full card-pop">
                        <TopBar title="Gõ từ tiếng Anh" onBack={onExit} />
                        <div className="w-full bg-gray-200 rounded-full h-2 mb-6">
                            <div className="bg-indigo-600 h-2 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="flex justify-between items-center mb-6">
                            <span className="text-sm md:text-base font-medium text-gray-500 uppercase tracking-wider">Câu {idx + 1} / {list.length}</span>
                            <span className="text-sm md:text-base font-bold text-indigo-600">Đúng: {score}</span>
                        </div>

                        <div className="md:grid md:grid-cols-2 md:gap-10 md:items-center">
                            <div className="mb-8 md:mb-0">
                                <h3 className="text-sm md:text-base text-gray-500 mb-2">Dịch sang tiếng Anh:</h3>
                                <p className="text-3xl md:text-5xl font-bold text-gray-800 leading-tight">{current.vi}</p>
                            </div>

                            <div>
                                <form onSubmit={submit} className="space-y-6">
                                    <div>
                                        <input
                                            type="text"
                                            value={input}
                                            onChange={(e) => setInput(e.target.value)}
                                            disabled={feedback !== null}
                                            autoFocus
                                            placeholder="Nhập câu trả lời..."
                                            className={`w-full p-4 md:p-5 border-2 rounded-xl text-lg md:text-2xl outline-none transition-all ${
                                                feedback === 'correct' ? 'border-green-500 bg-green-50' :
                                                feedback === 'wrong' ? 'border-red-500 bg-red-50 shake' :
                                                'border-gray-200 focus:border-indigo-500'
                                            }`}
                                        />
                                        <p className="mt-2 text-sm md:text-base text-gray-400 italic">Gợi ý: {current.hint || generateHint(current.en)}</p>
                                    </div>

                                    <button type="submit" disabled={feedback === null && !input.trim()}
                                        className={`w-full py-4 md:py-5 rounded-xl font-bold text-white text-lg md:text-xl shadow-lg transition-all active:scale-95 ${
                                            feedback === 'correct' ? 'bg-green-500 hover:bg-green-600' :
                                            feedback === 'wrong' ? 'bg-red-500 hover:bg-red-600' :
                                            'bg-indigo-600 hover:bg-indigo-700'
                                        }`}>
                                        {feedback === 'correct' ? <span><i className="fas fa-check mr-2"></i>Chính xác! · {isLast ? 'Xem kết quả' : 'Tiếp tục'}</span> :
                                         feedback === 'wrong' ? <span><i className="fas fa-times mr-2"></i>Đáp án: {current.en} · {isLast ? 'Xem kết quả' : 'Tiếp tục'}</span> :
                                         "Kiểm tra"}
                                    </button>
                                </form>
                                {feedback !== null && (
                                    <div className="mt-4 p-3 bg-gray-50 rounded-xl">
                                        <PronounceWidget word={current.en} compact />
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ---------- Quiz: Choice mode ----------
        function ChoiceQuiz({ list, pool, onFinish, onExit }) {
            const [idx, setIdx] = useState(0);
            const [selected, setSelected] = useState(null);
            const [score, setScore] = useState(0);
            const [history, setHistory] = useState([]);

            const current = list[idx];
            const progress = ((idx + 1) / list.length) * 100;
            const isLast = idx === list.length - 1;

            const options = useMemo(() => {
                const others = shuffle(pool.filter(w => w.vi !== current.vi)).slice(0, 3).map(w => w.vi);
                return shuffle([current.vi, ...others]);
            }, [idx]);

            const pick = (opt) => {
                if (selected) return;
                const isCorrect = opt === current.vi;
                setSelected(opt);
                if (isCorrect) { setScore(s => s + 1); playCorrectSound(); } else { playWrongSound(); }
                setHistory(prev => [...prev, { ...current, userInput: opt, isCorrect, mode: 'choice' }]);
            };

            const goNext = () => {
                if (!isLast) {
                    setIdx(i => i + 1);
                    setSelected(null);
                } else {
                    onFinish(score, history);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-6 md:p-10 rounded-2xl shadow-xl max-w-4xl w-full card-pop">
                        <TopBar title="Chọn nghĩa đúng" onBack={onExit} />
                        <div className="w-full bg-gray-200 rounded-full h-2 mb-6">
                            <div className="bg-purple-600 h-2 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="flex justify-between items-center mb-6">
                            <span className="text-sm md:text-base font-medium text-gray-500 uppercase tracking-wider">Câu {idx + 1} / {list.length}</span>
                            <span className="text-sm md:text-base font-bold text-purple-600">Đúng: {score}</span>
                        </div>

                        <div className="md:grid md:grid-cols-2 md:gap-10 md:items-center">
                            <div className="mb-8 md:mb-0 text-center">
                                <h3 className="text-sm md:text-base text-gray-500 mb-2">Từ này có nghĩa là gì?</h3>
                                <p className="text-4xl md:text-6xl font-extrabold text-gray-800 mb-4">{current.en}</p>
                                <div className="flex justify-center">
                                    <PronounceWidget word={current.en} compact />
                                </div>
                            </div>

                            <div>
                                <div className="grid sm:grid-cols-2 gap-3">
                                    {options.map((opt, i) => {
                                        let style = 'border-gray-200 hover:border-purple-300 bg-white';
                                        if (selected) {
                                            if (opt === current.vi) style = 'border-green-500 bg-green-50 text-green-700';
                                            else if (opt === selected) style = 'border-red-500 bg-red-50 text-red-700 shake';
                                            else style = 'border-gray-100 bg-gray-50 text-gray-400';
                                        }
                                        return (
                                            <button key={i} onClick={() => pick(opt)} disabled={selected !== null}
                                                className={`p-4 md:p-5 rounded-xl border-2 text-left font-semibold text-base md:text-lg transition-all ${style}`}>
                                                {opt}
                                            </button>
                                        );
                                    })}
                                </div>
                                {selected && (
                                    <button onClick={goNext}
                                        className={`w-full mt-5 py-4 md:py-5 rounded-xl font-bold text-white text-lg md:text-xl shadow-lg transition-all active:scale-95 ${
                                            selected === current.vi ? 'bg-green-500 hover:bg-green-600' : 'bg-purple-600 hover:bg-purple-700'
                                        }`}>
                                        {isLast ? <span>Xem kết quả<i className="fas fa-flag-checkered ml-2"></i></span>
                                                : <span>Câu tiếp theo<i className="fas fa-arrow-right ml-2"></i></span>}
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ---------- Quiz: Image mode ----------
        function ImageQuiz({ list, onFinish, onExit }) {
            const [idx, setIdx] = useState(0);
            const [input, setInput] = useState("");
            const [feedback, setFeedback] = useState(null);
            const [score, setScore] = useState(0);
            const [history, setHistory] = useState([]);
            const [candidates, setCandidates] = useState([]);
            const [candidateIdx, setCandidateIdx] = useState(0);
            const [imgLoading, setImgLoading] = useState(true);

            const current = list[idx];
            const progress = ((idx + 1) / list.length) * 100;
            const isLast = idx === list.length - 1;
            const imgSrc = candidates[candidateIdx] || "";

            useEffect(() => {
                let cancelled = false;
                setImgLoading(true);
                setCandidateIdx(0);
                setCandidates([]);
                buildImageCandidates(current.en).then(list => {
                    if (!cancelled) setCandidates(list);
                });
                return () => { cancelled = true; };
            }, [idx]);

            const goNext = () => {
                if (!isLast) {
                    setIdx(i => i + 1);
                    setInput("");
                    setFeedback(null);
                } else {
                    onFinish(score, history);
                }
            };

            const submit = (e) => {
                e.preventDefault();
                if (feedback) { goNext(); return; }
                if (!input.trim()) return;
                const isCorrect = normalize(input) === normalize(current.en);
                if (isCorrect) { setScore(s => s + 1); playCorrectSound(); } else { playWrongSound(); }
                setFeedback(isCorrect ? 'correct' : 'wrong');
                setHistory(prev => [...prev, { ...current, userInput: input, isCorrect, mode: 'image' }]);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-6 md:p-10 rounded-2xl shadow-xl max-w-4xl w-full card-pop">
                        <TopBar title="Nhìn hình đoán từ" onBack={onExit} />
                        <div className="w-full bg-gray-200 rounded-full h-2 mb-6">
                            <div className="bg-teal-600 h-2 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="flex justify-between items-center mb-6">
                            <span className="text-sm md:text-base font-medium text-gray-500 uppercase tracking-wider">Câu {idx + 1} / {list.length}</span>
                            <span className="text-sm md:text-base font-bold text-teal-600">Đúng: {score}</span>
                        </div>

                        <div className="md:grid md:grid-cols-2 md:gap-10 md:items-center">
                            <div className="mb-6 md:mb-0 relative rounded-xl overflow-hidden bg-gray-100 aspect-[4/3] flex items-center justify-center">
                                {imgLoading && <div className="absolute inset-0 flex items-center justify-center text-gray-300"><i className="fas fa-spinner fa-spin text-3xl"></i></div>}
                                {imgSrc && (
                                    <img
                                        key={imgSrc}
                                        src={imgSrc}
                                        alt="Đoán từ tiếng Anh"
                                        onLoad={() => setImgLoading(false)}
                                        onError={() => {
                                            setCandidateIdx(i => {
                                                const next = i + 1;
                                                if (next >= candidates.length) { setImgLoading(false); return i; }
                                                return next;
                                            });
                                        }}
                                        className={`w-full h-full object-cover transition-opacity ${imgLoading ? 'opacity-0' : 'opacity-100'}`}
                                    />
                                )}
                            </div>

                            <div>
                                <form onSubmit={submit} className="space-y-6">
                                    <div>
                                        <input
                                            type="text"
                                            value={input}
                                            onChange={(e) => setInput(e.target.value)}
                                            disabled={feedback !== null}
                                            autoFocus
                                            placeholder="Đây là từ gì trong tiếng Anh?"
                                            className={`w-full p-4 md:p-5 border-2 rounded-xl text-lg md:text-2xl outline-none transition-all ${
                                                feedback === 'correct' ? 'border-green-500 bg-green-50' :
                                                feedback === 'wrong' ? 'border-red-500 bg-red-50 shake' :
                                                'border-gray-200 focus:border-teal-500'
                                            }`}
                                        />
                                        <p className="mt-2 text-sm md:text-base text-gray-400 italic">Gợi ý: {current.hint || generateHint(current.en)}</p>
                                    </div>

                                    <button type="submit" disabled={feedback === null && !input.trim()}
                                        className={`w-full py-4 md:py-5 rounded-xl font-bold text-white text-lg md:text-xl shadow-lg transition-all active:scale-95 ${
                                            feedback === 'correct' ? 'bg-green-500 hover:bg-green-600' :
                                            feedback === 'wrong' ? 'bg-red-500 hover:bg-red-600' :
                                            'bg-teal-600 hover:bg-teal-700'
                                        }`}>
                                        {feedback === 'correct' ? <span><i className="fas fa-check mr-2"></i>Chính xác! · {isLast ? 'Xem kết quả' : 'Tiếp tục'}</span> :
                                         feedback === 'wrong' ? <span><i className="fas fa-times mr-2"></i>Đáp án: {current.en} · {isLast ? 'Xem kết quả' : 'Tiếp tục'}</span> :
                                         "Kiểm tra"}
                                    </button>
                                </form>
                                {feedback !== null && (
                                    <div className="mt-4 p-3 bg-gray-50 rounded-xl">
                                        <PronounceWidget word={current.en} compact />
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ---------- Result Screen ----------
        function Result({ score, total, history, onRestart, onHome }) {
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl max-w-3xl w-full text-center card-pop">
                        <h2 className="text-3xl font-bold mb-2 text-indigo-600">Kết quả bài kiểm tra</h2>
                        <p className="text-gray-500 mb-4">{score === total ? "Xuất sắc! Bạn đã trả lời đúng hết! 🎉" : "Cố lên, luyện tập thêm nhé!"}</p>
                        <div className="text-6xl font-bold mb-6 text-gray-800">{score} / {total}</div>
                        <div className="space-y-3 mb-8 text-left max-h-96 overflow-y-auto p-4 border rounded-lg">
                            {history.map((item, idx) => (
                                <div key={idx} className={`p-3 rounded-lg ${item.isCorrect ? 'bg-green-50' : 'bg-red-50'}`}>
                                    <div className="flex items-center justify-between gap-2">
                                        <p className="font-semibold text-gray-700">{idx + 1}. {item.mode === 'choice' ? item.en : item.mode === 'image' ? `🖼️ ${item.vi}` : item.vi}</p>
                                        <SpeakerButton word={item.en} size="w-8 h-8 text-sm" />
                                    </div>
                                    <p className="text-sm">Bạn chọn/nhập: <span className={item.isCorrect ? 'text-green-600' : 'text-red-600'}>{item.userInput || "(Để trống)"}</span></p>
                                    {!item.isCorrect && <p className="text-sm text-gray-600">Đáp án đúng: <span className="font-medium text-green-700">{item.mode === 'choice' ? item.vi : item.en}</span></p>}
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-3 justify-center">
                            <button onClick={onHome} className="bg-gray-100 text-gray-700 px-6 py-3 rounded-full font-semibold hover:bg-gray-200 transition-colors">
                                <i className="fas fa-house mr-2"></i>Trang chủ
                            </button>
                            <button onClick={onRestart} className="bg-indigo-600 text-white px-8 py-3 rounded-full font-semibold hover:bg-indigo-700 transition-colors">
                                <i className="fas fa-rotate-right mr-2"></i>Thử lại
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ---------- App Root ----------
        function App() {
            const [customWords, setCustomWords] = useState(() => loadCustomWords());
            const [customQuizzes, setCustomQuizzes] = useState(() => loadCustomQuizzes());
            const [history, setHistory] = useState(() => loadHistory());
            const [screen, setScreen] = useState('home');
            const [mode, setMode] = useState('type');
            const [quizList, setQuizList] = useState([]);
            const [quizPool, setQuizPool] = useState([]);
            const [activeQuiz, setActiveQuiz] = useState(null); // custom quiz object, or null for the general pool
            const [result, setResult] = useState({ score: 0, total: 0, history: [] });

            const allWords = useMemo(() => [...defaultWords, ...customWords], [customWords]);

            useEffect(() => { saveCustomWords(customWords); }, [customWords]);
            useEffect(() => { saveCustomQuizzes(customQuizzes); }, [customQuizzes]);
            useEffect(() => { saveHistory(history); }, [history]);

            const startQuiz = (chosenMode) => {
                setActiveQuiz(null);
                setMode(chosenMode);
                setQuizList(shuffle(allWords));
                setQuizPool(allWords);
                setScreen('quiz');
            };

            const playCustomQuiz = (quiz) => {
                setActiveQuiz(quiz);
                setMode(quiz.mode);
                setQuizList(shuffle(quiz.words));
                setQuizPool(quiz.words);
                setScreen('quiz');
            };

            const restartQuiz = () => {
                if (activeQuiz) playCustomQuiz(activeQuiz);
                else startQuiz(mode);
            };

            const finishQuiz = (score, historyItems) => {
                setResult({ score, total: quizList.length, history: historyItems });
                const record = {
                    date: new Date().toISOString(),
                    mode,
                    score,
                    total: quizList.length,
                    quizName: activeQuiz ? activeQuiz.name : null,
                };
                setHistory(prev => [record, ...prev].slice(0, MAX_HISTORY));
                setScreen('result');
            };

            const addWord = (word) => setCustomWords(prev => [...prev, word]);
            const deleteWord = (idx) => setCustomWords(prev => prev.filter((_, i) => i !== idx));

            const addQuiz = (quiz) => { setCustomQuizzes(prev => [...prev, quiz]); setScreen('my-quizzes'); };
            const deleteQuiz = (id) => setCustomQuizzes(prev => prev.filter(q => q.id !== id));
            const clearHistory = () => setHistory([]);

            // Xin quyền Micro đúng 1 lần ngay khi vào web; sau khi được cấp, trình duyệt tự nhớ vĩnh viễn
            // cho tên miền này nên các lần bấm micro sau đó sẽ không hỏi lại nữa.
            const micStatus = useMicPermission();

            let content;
            switch (screen) {
                case 'add':
                    content = <AddWord onBack={() => setScreen('home')} onSave={(w) => { addWord(w); }} />;
                    break;
                case 'manage':
                    content = <ManageWords words={customWords} onBack={() => setScreen('home')} onDelete={deleteWord} />;
                    break;
                case 'create-quiz':
                    content = <CreateQuiz onBack={() => setScreen('home')} onSave={addQuiz} />;
                    break;
                case 'my-quizzes':
                    content = <MyQuizzes quizzes={customQuizzes} onBack={() => setScreen('home')} onPlay={playCustomQuiz} onDelete={deleteQuiz} />;
                    break;
                case 'pronounce':
                    content = <PronunciationPractice words={allWords} onBack={() => setScreen('home')} />;
                    break;
                case 'word-list':
                    content = <WordList words={allWords} onBack={() => setScreen('home')} />;
                    break;
                case 'history':
                    content = <QuizHistory items={history} onBack={() => setScreen('home')} onClear={clearHistory} />;
                    break;
                case 'quiz':
                    content = mode === 'type'
                        ? <TypeQuiz list={quizList} onFinish={finishQuiz} onExit={() => setScreen('home')} />
                        : mode === 'choice'
                        ? <ChoiceQuiz list={quizList} pool={quizPool} onFinish={finishQuiz} onExit={() => setScreen('home')} />
                        : <ImageQuiz list={quizList} onFinish={finishQuiz} onExit={() => setScreen('home')} />;
                    break;
                case 'result':
                    content = <Result {...result} onRestart={restartQuiz} onHome={() => setScreen('home')} />;
                    break;
                default:
                    content = <Home wordCount={allWords.length} quizCount={customQuizzes.length} historyCount={history.length} onStart={startQuiz}
                        onAdd={() => setScreen('add')} onManage={() => setScreen('manage')}
                        onCreateQuiz={() => setScreen('create-quiz')} onMyQuizzes={() => setScreen('my-quizzes')}
                        onPronounce={() => setScreen('pronounce')} onWordList={() => setScreen('word-list')}
                        onHistory={() => setScreen('history')} />;
            }

            return (
                <MicPermissionContext.Provider value={micStatus}>
                    <MicPermissionBanner status={micStatus} />
                    {content}
                </MicPermissionContext.Provider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
